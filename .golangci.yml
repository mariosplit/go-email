version: "2"
run:
  issues-exit-code: 1
  tests: true
linters:
  enable:
    - goconst
    - gosec
    - misspell
    - revive
    - unconvert
    - whitespace
  settings:
    goconst:
      min-len: 3
      # 4+ occurrences warrants a constant; 3 over-fires on Graph $select
      # field-name vocabulary that reads better as inline literals.
      min-occurrences: 4
    misspell:
      locale: US
    revive:
      rules:
        # package-comments wants every file's package clause to carry a
        # "Package email ..." doc comment; this repo documents the package once
        # and uses plain per-file header comments elsewhere — an intentional
        # style, so the rule is disabled rather than duplicating the doc 12x.
        - name: package-comments
          disabled: true
  exclusions:
    generated: lax
    rules:
      - linters:
          - errcheck
          - goconst
          - gosec
        path: _test\.go
      # gosec G304/G703 (file inclusion / path traversal via variable) are
      # inherent to a mail library whose job is to read caller-supplied
      # attachment and credential file paths — the paths come from the API
      # caller, not untrusted external input. Documented exception.
      - linters: [gosec]
        text: "G304|G703"
      # G117 flags the "AccessToken"/"access_token" JSON struct tag as matching
      # a secret pattern; it is a field name on an auth struct, not a leaked
      # secret literal. False positive.
      - linters: [gosec]
        text: "G117"
    paths:
      - examples
      - third_party$
      - builtin$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  new: false
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/mariosplit/go-email
  exclusions:
    generated: lax
    paths:
      - examples
      - third_party$
      - builtin$
